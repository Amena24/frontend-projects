<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
  <section class="py-16 bg-[#EBF4F6] min-h-screen">
  <div class="max-w-6xl mx-auto px-4 w-full">
    
    <!-- Card -->
    <div class="bg-white rounded-xl shadow-lg p-6 md:p-8 lg:p-10 w-full md:w-3/5 lg:w-3/5 mx-auto">
      
      <!-- Page Title -->
      <div class="text-center mb-6">
        <h1 class="text-2xl md:text-3xl lg:text-3xl font-bold text-[#09637E]">
          Answer Review
        </h1>
        <p class="text-sm md:text-base text-[#1F2933]/70 mt-1">
          Review your answers and check correct solutions
        </p>
      </div>
    
      <!-- Questions List -->
      <div id="q-list" class="w-full  overflow-hidden  "> 
        
      </div>
      
      <!-- Action Buttons -->
        <div class="flex flex-col items-end justify-center ">
                    <button
                        class=" text-center mt-10  cursor-pointer md:w-auto bg-[#088395] hover:bg-[#09637E] text-white font-medium px-8 py-3 md:px-10 md:py-3.5 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-[#088395]/50">
                        Finish
                    </button>
                </div>
    </div>
    <!-- End Card -->
  </div>
</section>

<script>
  if(sessionStorage.getItem("isLoggedIn") !== "true"){
    window.location.href = "welcome.html";}
  var btn = document.querySelector("button")
        btn.addEventListener("click", function () {
          
            window.close()

        })
  var qlist=document.querySelector("#q-list")
 var answer=JSON.parse(localStorage.getItem("answers"))
    console.log(answer)
   
 
  for(var i=0;i<10;i++){
   var  question=localStorage.getItem(`q${i}`)
    
   qlist.insertAdjacentHTML("beforeend",question)
    qlist.innerHTML+=question
    

    var last= qlist.lastElementChild
   
    last.classList.remove("hidden","h-80")
    last.classList.add("w-[100%]","border" ,"border-[#7AB2B2]/30", "rounded-xl","p-4" ,"md:p-5")
    if(answer[i]==null) {
      last.querySelector("p .span").classList.add("text-amber-500")
        last.querySelector("p .span").innerHTML+="(Not Answerd)"
        
        }
    last.querySelectorAll("label").forEach(el=>{
      el.classList.remove("cursor-pointer","hover:bg-[#EBF4F6]","bg-white")
      el.classList.add("pointer-events-none")

      if(last.getAttribute("answer")== el.querySelector("input").value){
        el.classList.add("bg-[#2CB67D]/10")

      }
      
      if(answer[i]==el.querySelector("input").value){
           el.querySelector("input").setAttribute("checked","checked")
           if(el.querySelector("input").value==answer[i]&&last.getAttribute("answer")!== el.querySelector("input").value) {
       
          el.classList.add("bg-[#E63946]/10","border-[#F87272]","border-[1.8px]")

         }
         else if(el.querySelector("input").value==answer[i]&&last.getAttribute("answer")== el.querySelector("input").value) {
       
          el.classList.add("border-[#36D399]","border-[1.8px]")

         }
        }     
    })
  }
 
</script>
</body>
</html>
